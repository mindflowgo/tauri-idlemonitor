<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IdleMonitor Demo</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.ts"></script>
  </head>

  <body>
    <main class="container">
      <section class="row">
        <h2>IdleMonitor Demo</h2>
        
        <span id="status" class="status-active">Active</span>
        
        <div id="timer" class="timer-display">00:00</div>
        <div id="idle-status" class="idle-display">Currently Idle for: 0s</div>
        
        <div id="events" class="log-container">
          <div class="log-system-msg">[System] Ready. Screen lock, system idle, and suspend events will be logged here.</div>
        </div>
      </section>
    </main>
  </body>
</html>
